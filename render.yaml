# Render Blueprint - sobe o Orion Cloud de graca (plano free).
# No Render: New > Blueprint > aponta pro seu repositorio. Ele le este arquivo.
services:
  - type: web
    name: orion
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ORION_SECRET
        generateValue: true          # gera um segredo forte automatico
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false                  # voce cola a chave (gratis do Groq) no painel
      # Pagamento (opcional, cole quando tiver):
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
