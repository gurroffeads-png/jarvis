# Render Blueprint - ORION (app principal). New > Blueprint > aponta pro repositorio.
services:
  - type: web
    name: orion
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_MODE
        value: orion                 # este servico abre o ORION na raiz "/"
      - key: ORION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false                  # Postgres (Render/Neon) - dados persistentes. IMPORTANTE.
      - key: LLM_API_KEY
        sync: false                  # chave gratis do Gemini (aistudio.google.com). Base/modelo o codigo deduz sozinho.
      - key: MP_ACCESS_TOKEN
        sync: false                  # seu Mercado Pago (recebe planos + mensalidades da Clinica+)
      - key: VAPID_PRIVATE
        sync: false                  # notificacoes push (opcional)
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false                  # verificacao do webhook do WhatsApp (opcional)
