<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atendente</title>
<style>
:root{--rosa:#b76e79;--rosa2:#caa3a9;--tinta:#3a2d33;--bg:#fbf6f4;--bolha:#f1e4e2;--linha:#ecdcd9;--dim:#8a7a7e}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tinta)}
#wrap{display:flex;flex-direction:column;height:100%}
header{background:linear-gradient(135deg,var(--rosa),#9a5560);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
header b{font-size:15px;display:block}header .st{font-size:11px;opacity:.9}
#dados{display:flex;gap:6px;padding:8px 10px;background:#fff;border-bottom:1px solid var(--linha)}
#dados input{flex:1;min-width:0;border:1px solid var(--linha);border-radius:9px;padding:7px 9px;font-size:12px;color:var(--tinta);background:var(--bg)}
#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.m{max-width:84%;padding:9px 12px;border-radius:14px;font-size:13.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
.m.bot{background:var(--bolha);color:var(--tinta);align-self:flex-start;border-bottom-left-radius:4px}
.m.eu{background:var(--rosa);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.m.dig{color:var(--dim);font-style:italic;background:transparent;padding:2px 6px}
form{display:flex;gap:8px;padding:10px;border-top:1px solid var(--linha);background:#fff}
#txt{flex:1;border:1px solid var(--linha);border-radius:12px;padding:10px 12px;font-size:14px;resize:none;max-height:90px;color:var(--tinta);background:var(--bg)}
button{border:0;background:var(--rosa);color:#fff;border-radius:12px;padding:0 16px;font-size:18px;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
.foot{text-align:center;font-size:10px;color:var(--dim);padding:4px 0 8px;background:#fff}
.foot b{color:var(--rosa)}
a.cta{align-self:flex-start;font-size:12px;color:var(--rosa);text-decoration:none;border:1px solid var(--rosa);border-radius:10px;padding:5px 10px;margin-top:-2px}
</style></head><body>
<div id="wrap">
  <header><div class="av" id="av">✨</div><div><b id="hNome">Atendente</b><span class="st" id="hSt">online agora</span></div></header>
  <div id="dados">
    <input id="cNome" placeholder="Seu nome">
    <input id="cTel" placeholder="WhatsApp (com DDD)" inputmode="tel">
  </div>
  <div id="msgs"></div>
  <form id="f"><textarea id="txt" rows="1" placeholder="Escreva sua mensagem..." autocomplete="off"></textarea><button id="bt" type="submit">➤</button></form>
  <div class="foot">atendido por <b>Orion</b> ✦ Clínica+</div>
</div>
<script>
const $=id=>document.getElementById(id);
const CID=new URLSearchParams(location.search).get('c')||'';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let HIST=[]; let CLI={}; let enviando=false;
$('cNome').value=localStorage.getItem('ow_nome')||''; $('cTel').value=localStorage.getItem('ow_tel')||'';
$('cNome').oninput=()=>localStorage.setItem('ow_nome',$('cNome').value);
$('cTel').oninput=()=>localStorage.setItem('ow_tel',$('cTel').value);
function add(role,txt){ const d=document.createElement('div'); d.className='m '+(role==='eu'?'eu':'bot'); d.textContent=txt; $('msgs').appendChild(d); $('msgs').scrollTop=$('msgs').scrollHeight; return d; }
function digOn(){ const d=document.createElement('div'); d.className='m dig'; d.id='dig'; d.textContent='digitando...'; $('msgs').appendChild(d); $('msgs').scrollTop=$('msgs').scrollHeight; }
function digOff(){ const d=$('dig'); if(d)d.remove(); }
(async function(){
  if(!CID){ add('bot','Link do atendente inválido.'); return; }
  let info={}; try{ info=await (await fetch('/pub/clinica?c='+encodeURIComponent(CID))).json(); }catch(e){}
  const nome=(info&&info.nome)||'Clínica';
  $('hNome').textContent=nome;
  document.title='Atendente · '+nome;
  add('bot', (info&&info.boas_vindas) ? info.boas_vindas : ('Oi! 💖 Eu sou o atendente da '+nome+'. Posso tirar dúvidas, mostrar horários e já marcar sua consulta. Como posso te ajudar?'));
  // link de agendamento por formulário, como alternativa
  const a=document.createElement('a'); a.className='cta'; a.href='/agendar?c='+encodeURIComponent(CID); a.target='_blank'; a.textContent='📅 Ver agenda e marcar pelo formulário'; $('msgs').appendChild(a);
})();
$('txt').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); $('f').requestSubmit(); } });
$('txt').addEventListener('input',function(){ this.style.height='auto'; this.style.height=Math.min(90,this.scrollHeight)+'px'; });
$('f').addEventListener('submit',async e=>{
  e.preventDefault(); if(enviando) return;
  const msg=$('txt').value.trim(); if(!msg) return;
  $('txt').value=''; $('txt').style.height='auto'; add('eu',msg); HIST.push({role:'user',content:msg});
  enviando=true; $('bt').disabled=true; digOn();
  let r={};
  try{ r=await (await fetch('/pub/atendente',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({c:CID,msg,historico:HIST,nome:$('cNome').value.trim(),telefone:$('cTel').value.trim()})})).json(); }
  catch(err){ r={resposta:'Sem conexão agora. Tenta de novo?'}; }
  digOff();
  const resp=(r&&r.resposta)||(r&&r.erro)||'Pode repetir, por favor?';
  add('bot',resp); HIST.push({role:'assistant',content:resp});
  enviando=false; $('bt').disabled=false; $('txt').focus();
});
</script>
</body></html>
